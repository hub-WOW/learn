<!DOCTYPE html>
<html lang="en">

<head>
    <link href="/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Design - WOW</title>

    <!-- External Dependencies -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/markdown-it-texmath/css/texmath.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">

    <!-- Local Styles -->
    <link rel="stylesheet" href="/Kathisto/styles.css">

    <!-- Markdown & Math Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/markdown-it@13.0.1/dist/markdown-it.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it-texmath/texmath.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>

    <!-- Shared Infrastructure -->
    <script src="/Kathisto/layout.js"></script>
    <script src="/Kathisto/md-engine.js"></script>
</head>

<body>
    <!-- The sidebar will be injected here by Layout.init() -->
    <div id="sidebar-wrapper"></div>

    <main class="main-content">
        <!-- Reusable Hero Section -->
        <div id="hero-wrapper"></div>

        <div class="content-container" id="content">
            <!-- Content will be rendered by MdEngine -->
             <div id="loading-indicator">Loading course modules...</div>
        </div>
    </main>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const TOP_BAR_LINKS = [
                { name: 'Home', url: 'http://localhost:8090/' },
                {
                    name: 'Learn', url: 'http://learn.localhost:8090/',
                    children: [
                        { name: 'System Design', url: 'http://learn.localhost:8090/courses/system-design/index.html' },
                        { name: 'Cryptography', url: 'http://learn.localhost:8090/courses/system-design/trust.html' },
                        { name: 'Psychology', url: 'http://learn.localhost:8090/courses/psychology/cognition.html' },
                        { name: 'Markdown Syntax', url: 'http://learn.localhost:8090/documentation/markdown.html' }
                    ]
                }
            ];

            Layout.init({ topBarLinks: TOP_BAR_LINKS });

            Layout.renderUnit({
                hero: {
                    logo: '/resources/logo.svg',
                    title: 'System Design',
                    subtitle: 'Welcome to System Design in Programming at WOW!! It is one of the most important aspect of software engineering, to create optimised, fast and scalable codebases.',
                    tagline: 'Let\'s get this shit started...'
                },
                modules: [
                    '/_modules/system-design/intro.md'
                ]
            });
        });
    </script>
</body>

</html>
